// Tiny CSV + download helpers (no dependencies).
function toCSV(rows, columns) {
  const esc = (v) => {
    if (v == null) v = ''
    v = String(v)
    return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v
  }
  const header = columns.map((c) => esc(c.label || c.key)).join(',')
  const body = rows.map((r) => columns.map((c) => esc(r[c.key])).join(',')).join('\n')
  return header + '\n' + body
}

function download(filename, text, type = 'text/csv;charset=utf-8') {
  const blob = new Blob([text], { type })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url
  a.download = filename
  document.body.appendChild(a)
  a.click()
  a.remove()
  URL.revokeObjectURL(url)
}

function money(n) {
  if (n == null || n === '') return ''
  const x = Number(n)
  if (Number.isNaN(x)) return String(n)
  return x.toLocaleString('en-US', { style: 'currency', currency: 'USD' })
}

function statusClass(v) {
  const s = String(v || '').toLowerCase()
  if (s === 'done' || s === 'ok') return 'pill pill-green'
  if (s === 'in progress') return 'pill pill-amber'
  if (s === 'retire' || s === 'n/a') return 'pill pill-gray'
  return 'pill pill-red'
}
function sevClass(v) {
  const s = String(v || '').toLowerCase()
  if (s === 'critical') return 'pill pill-red'
  if (s === 'high') return 'pill pill-orange'
  if (s === 'medium') return 'pill pill-amber'
  return 'pill pill-green'
}

function Cell({ row, col, onEdit }) {
  if (col.type === 'derived') {
    const gap = (Number(row.qb_balance) || 0) - (row.bank_balance == null ? Number(row.qb_balance) || 0 : Number(row.bank_balance) || 0)
    const off = row.bank_balance == null ? '—' : money(gap)
    return <span className={Math.abs(gap) > 0.005 && row.bank_balance != null ? 'gap-bad' : ''}>{off}</span>
  }
  const val = row[col.key]
  if (col.type === 'select') {
    const cls = col.key === 'status' ? statusClass(val) : col.key === 'severity' ? sevClass(val) : ''
    return (
      <select className={'cell-select ' + cls} value={val ?? ''} onChange={(e) => onEdit(col.key, e.target.value)}>
        <option value=""></option>
        {col.options.map((o) => (
          <option key={o} value={o}>{o}</option>
        ))}
      </select>
    )
  }
  if (col.type === 'money' || col.type === 'number') {
    return (
      <input
        className="cell-input num"
        type="number"
        step="0.01"
        value={val ?? ''}
        onChange={(e) => onEdit(col.key, e.target.value === '' ? null : Number(e.target.value))}
      />
    )
  }
  return (
    <input
      className="cell-input"
      type="text"
      value={val ?? ''}
      onChange={(e) => onEdit(col.key, e.target.value)}
    />
  )
}

function EditableTable({ table, rows, onEdit, onDelete, onAdd }) {
  const cols = COLS[table]
  return (
    <div className="table-wrap">
      <table className="grid">
        <thead>
          <tr>
            {cols.map((c) => (
              <th key={c.key} style={{ minWidth: c.w }}>{c.label}</th>
            ))}
            <th style={{ width: 34 }}></th>
          </tr>
        </thead>
        <tbody>
          {rows.map((r) => (
            <tr key={r.id}>
              {cols.map((c) => (
                <td key={c.key}>
                  <Cell row={r} col={c} onEdit={(k, v) => onEdit(r.id, k, v)} />
                </td>
              ))}
              <td>
                <button className="row-del" title="Delete row" onClick={() => onDelete(r.id)}>×</button>
              </td>
            </tr>
          ))}
          {rows.length === 0 && (
            <tr><td colSpan={cols.length + 1} className="empty">No rows yet.</td></tr>
          )}
        </tbody>
      </table>
      <button className="btn ghost add" onClick={onAdd}>+ Add row</button>
    </div>
  )
}

function exportCSV(table, rows) {
  const cols = COLS[table].filter((c) => c.type !== 'derived')
  download(`stevenson_${table}.csv`, toCSV(rows, cols))
}

function Dashboard({ data }) {
  const findings = data.findings || []
  const bySev = SEV.map((s) => ({ s, n: findings.filter((f) => f.severity === s).length }))
  const done = findings.filter((f) => ['Done', 'OK'].includes(f.status)).length
  const bankGap = (data.banks || []).reduce((a, b) => {
    if (b.bank_balance == null) return a
    return a + Math.abs((Number(b.qb_balance) || 0) - (Number(b.bank_balance) || 0))
  }, 0)
  const phantomAP = (data.arap || []).filter((r) => r.kind === 'AP').reduce((a, r) => a + (Number(r.amount) || 0), 0)
  const loanTotal = (data.loanaccts || []).reduce((a, r) => a + Math.abs(Number(r.qb_balance) || 0), 0)
  const openItems = TABLES.reduce((a, t) => a + (data[t] || []).filter((r) => r.status === 'To do').length, 0)

  const pct = findings.length ? Math.round((done / findings.length) * 100) : 0

  return (
    <div className="dash">
      <div className="cards">
        <div className="card">
          <div className="card-k">Cleanup progress</div>
          <div className="card-v">{pct}%</div>
          <div className="bar"><div className="bar-fill" style={{ width: pct + '%' }} /></div>
          <div className="card-sub">{done} of {findings.length} top findings cleared</div>
        </div>
        <div className="card">
          <div className="card-k">Open "to-do" items</div>
          <div className="card-v">{openItems}</div>
          <div className="card-sub">across every module</div>
        </div>
        <div className="card">
          <div className="card-k">Bank vs QB gap</div>
          <div className="card-v">{money(bankGap)}</div>
          <div className="card-sub">cash to reconcile</div>
        </div>
        <div className="card">
          <div className="card-k">Phantom A/P</div>
          <div className="card-v">{money(phantomAP)}</div>
          <div className="card-sub">to verify / write off</div>
        </div>
        <div className="card">
          <div className="card-k">Loan accounts</div>
          <div className="card-v">{money(loanTotal)}</div>
          <div className="card-sub">{(data.loanaccts || []).length} to reconcile across entities</div>
        </div>
      </div>

      <div className="sev-row">
        {bySev.map(({ s, n }) => (
          <div key={s} className="sev-box">
            <span className={sevClass(s)}>{s}</span>
            <b>{n}</b>
          </div>
        ))}
      </div>

      <div className="note">
        <b>How to use this:</b> QuickBooks stays frozen. Work each module, set the corrected balance, and move
        items from <span className="pill pill-red">To do</span> to <span className="pill pill-green">Done</span>.
        When an item produces a journal entry, add it on the <b>Adjusting Entries</b> tab and export the CSV for your CPA.
        Nothing here changes QuickBooks.
      </div>
    </div>
  )
}

      {summary.length > 0 && (
        <div className="summary">
          <h3 className="sub">Computed net per counterparty (from the ledger)</h3>
          <table className="grid mini">
            <thead><tr><th>Counterparty</th><th>Net (owed by Stevenson +)</th></tr></thead>
            <tbody>
              {summary.map((s) => (
                <tr key={s.cp}><td>{s.cp}</td><td className="num">{money(s.net)}</td></tr>
              ))}
            </tbody>
          </table>
          <p className="muted">Compare each net to the QB balance above and to the counterparty's own books — they should agree.</p>
        </div>
      )}
    </div>
  )
}

function App() {
  const [tab, setTab] = useState('dashboard')
  const [data, setData] = useState(null)
  const [busy, setBusy] = useState(false)

  async function loadAll() {
    const out = {}
    for (const t of TABLES) out[t] = await list(t)
    setData(out)
  }
  useEffect(() => { loadAll() }, [])

  async function edit(table, id, key, value) {
    const row = { ...(data[table].find((r) => r.id === id)), [key]: value }
    setData((d) => ({ ...d, [table]: d[table].map((r) => (r.id === id ? row : r)) }))
    await upsert(table, row)
  }
  async function add(table) {
    const blank = { id: uid() }
    COLS[table].forEach((c) => { if (c.type !== 'derived') blank[c.key] = c.type === 'money' || c.type === 'number' ? null : '' })
    if (COLS[table].some((c) => c.key === 'status')) blank.status = 'To do'
    setData((d) => ({ ...d, [table]: [...d[table], blank] }))
    await upsert(table, blank)
  }
  async function del(table, id) {
    setData((d) => ({ ...d, [table]: d[table].filter((r) => r.id !== id) }))
    await remove(table, id)
  }

  async function doBackup() {
    const all = await exportAll()
    download('stevenson-workbench-backup.json', JSON.stringify(all, null, 2), 'application/json')
  }
  function doRestore(e) {
    const file = e.target.files?.[0]
    if (!file) return
    const reader = new FileReader()
    reader.onload = async () => {
      try {
        setBusy(true)
        await importAll(JSON.parse(reader.result))
        await loadAll()
        alert('Backup restored.')
      } catch (err) { alert('Could not read that file: ' + err.message) } finally { setBusy(false) }
    }
    reader.readAsText(file)
    e.target.value = ''
  }
  async function doReset() {
    if (!confirm('Reset all data back to the original seed? This discards your changes (Local mode only).')) return
    resetLocal()
    await loadAll()
  }
  async function cpaPacket() {
    const rows = data.adjustments || []
    if (rows.length === 0) { alert('No adjusting entries yet. Add them on the Adjusting Entries tab.'); return }
    exportCSV('adjustments', rows)
  }

  if (!data) return <div className="loading">Loading workbench…</div>

  return (
    <div className="app">
      <header className="topbar">
        <div className="brand">
          <div className="logo">SB</div>
          <div>
            <div className="title">Stevenson Books — Cleanup Workbench</div>
            <div className="subtitle">Your corrected books, tracked outside QuickBooks. QuickBooks is never changed by this app.</div>
          </div>
        </div>
        <div className="top-actions">
          <span className={'mode ' + (MODE === 'supabase' ? 'mode-cloud' : 'mode-local')}>
            {MODE === 'supabase' ? '☁ Cloud sync' : '💾 Local (this browser)'}
          </span>
          <button className="btn ghost" onClick={() => sb.auth.signOut()}>Sign out</button>
          <button className="btn" onClick={cpaPacket}>Export CPA packet</button>
          <button className="btn ghost" onClick={doBackup}>Backup</button>
          <label className="btn ghost file">Restore<input type="file" accept="application/json" onChange={doRestore} hidden /></label>
          {MODE === 'local' && <button className="btn ghost" onClick={doReset}>Reset</button>}
        </div>
      </header>

      <nav className="tabs">
        {TABS.map((t) => (
          <button key={t.id} className={'tab' + (tab === t.id ? ' active' : '')} onClick={() => setTab(t.id)}>{t.label}</button>
        ))}
      </nav>

      <main className="content">
        {busy && <div className="loading">Working…</div>}
        {tab === 'dashboard' && <Dashboard data={data} />}

        {tab === 'loans' && <LoansTab data={data} edit={edit} del={del} add={add} />}

        {['coa', 'banks', 'arap', 'findings', 'adjustments'].includes(tab) && (
          <div>
            <div className="tbar">
              <h3 className="sub">{TABS.find((t) => t.id === tab).label}</h3>
              <button className="btn" onClick={() => exportCSV(tab, data[tab])}>Export CSV</button>
            </div>
            <EditableTable
              table={tab}
              rows={data[tab]}
              onEdit={edit.bind(null, tab) /* eslint-disable-line */}
              onDelete={(id) => del(tab, id)}
              onAdd={() => add(tab)}
            />
          </div>
        )}
      </main>

      <footer className="foot">
        Read-only review captured June 19, 2026 • Figures are "as recorded in QuickBooks" except the live bank-feed column •
        Coordinate any change to a filed year with your CPA.
      </footer>
    </div>
  )
}



function Login() {
  const [email, setEmail] = useState('john@jvsindustries.com');
  const [code, setCode] = useState('');
  const [sent, setSent] = useState(false);
  const [msg, setMsg] = useState('');
  const [busy, setBusy] = useState(false);
  async function send() {
    setBusy(true); setMsg('');
    const { error } = await sb.auth.signInWithOtp({ email, options: { shouldCreateUser: true } });
    setBusy(false);
    if (error) setMsg(error.message); else { setSent(true); setMsg('Check your email for a 6-digit code.'); }
  }
  async function verify() {
    setBusy(true); setMsg('');
    const { error } = await sb.auth.verifyOtp({ email, token: code.trim(), type: 'email' });
    setBusy(false);
    if (error) setMsg(error.message);
  }
  return (
    <div className="login">
      <div className="login-card">
        <div className="logo">SB</div>
        <h1>Stevenson Books</h1>
        <p className="muted">Cleanup Workbench · sign in to continue</p>
        <label>Email</label>
        <input className="login-input" type="email" value={email} onChange={(e) => setEmail(e.target.value)} disabled={sent} />
        {sent && (<><label>6-digit code</label><input className="login-input" type="text" inputMode="numeric" value={code} onChange={(e) => setCode(e.target.value)} placeholder="——————" autoFocus /></>)}
        {!sent
          ? <button className="btn login-btn" onClick={send} disabled={busy}>{busy ? 'Sending…' : 'Email me a code'}</button>
          : <button className="btn login-btn" onClick={verify} disabled={busy}>{busy ? 'Verifying…' : 'Sign in'}</button>}
        {sent && <button className="linkbtn" onClick={() => { setSent(false); setCode(''); setMsg(''); }}>use a different email</button>}
        {msg && <div className="login-msg">{msg}</div>}
        <div className="login-foot">Locked to your IVAI account · your books stay private</div>
      </div>
    </div>
  );
}
function Root() {
  const [session, setSession] = useState(undefined);
  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);
  if (session === undefined) return <div className="loading">Loading…</div>;
  if (!session) return <Login />;
  return <App />;
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Root));
</script>
</body>
